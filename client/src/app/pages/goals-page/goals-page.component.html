<app-header></app-header>

<div class="app-layout">
  <aside class="sidebar-container">
    <app-sidebar></app-sidebar>
  </aside>

  <main class="main-content">
    <h1 class="title-cursive">{{ userName }}'s Goals</h1>

    <div class="widget-card">
      <div class="date-row">
        <label for="goalDate">Date</label>
        <input id="goalDate" type="date" [(ngModel)]="selectedDate">
      </div>
    </div>

    <app-goals class="widget-card" [date]="selectedDate"></app-goals>
  </main>
</div>
