<app-header></app-header>

<div class="container-fluid py-3">
  <div class="row g-3">
    <aside class="col-12 col-md-3 col-lg-2">
      <div class="card">
        <div class="card-body p-2">
          <app-sidebar></app-sidebar>
        </div>
      </div>
    </aside>

    <main class="col-12 col-md-9 col-lg-10">
      <div class="d-flex flex-column gap-3">
        <h1 class="h3 mb-0">{{ userName }}'s Tasks</h1>

        <div class="card">
          <div class="card-body">
            <div class="row g-2 align-items-center">
              <div class="col-auto">
                <label for="taskDate" class="col-form-label">Date</label>
              </div>
              <div class="col-auto">
                <input id="taskDate" type="date" class="form-control" [(ngModel)]="selectedDate">
              </div>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-body">
            <app-daily-todo [date]="selectedDate"></app-daily-todo>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>
