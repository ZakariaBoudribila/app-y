<app-header></app-header>

<div class="app-layout">
  <aside class="sidebar-container">
    <app-sidebar></app-sidebar>
  </aside>

  <main class="main-content">
    <h1 class="title-cursive">{{ userName }}'s Journal</h1>

    <div class="widget-card">
      <div class="date-row">
        <label for="journalDate">Date</label>
        <input id="journalDate" type="date" [(ngModel)]="selectedDate" (ngModelChange)="onDateChange($event)">
      </div>
    </div>

    <app-notes class="widget-card" [date]="selectedDate"></app-notes>
  </main>
</div>
