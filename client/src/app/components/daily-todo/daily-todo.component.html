<div class="card-header">
  <h3 class="card-title">Daily To-Do</h3>
  <div class="floral-decor">🌸</div> 
</div>

<div class="stats" *ngIf="totalTasks > 0">
  <div class="stats-row">
    <div class="stats-label">Complétion</div>
    <div class="stats-value">{{ completedTasks }} / {{ totalTasks }} ({{ completionPercent }}%)</div>
  </div>

  <div class="progress" aria-hidden="true">
    <div class="progress-bar" [style.width.%]="completionPercent"></div>
  </div>

  <div class="breakdown" *ngIf="byCategory.length > 0">
    <div class="breakdown-item" *ngFor="let b of byCategory">
      <div class="breakdown-head">
        <span class="category-pill">{{ b.category }}</span>
        <span class="breakdown-text">{{ b.completed }} / {{ b.total }} ({{ b.percent }}%)</span>
      </div>
      <div class="progress progress--thin" aria-hidden="true">
        <div class="progress-bar" [style.width.%]="b.percent"></div>
      </div>
    </div>
  </div>
</div>

<div class="task-list">
  <div class="task-item" *ngFor="let task of tasks" [@taskItem]="task.is_completed ? 'done' : 'active'">
    <label class="custom-checkbox">
      <input
        type="checkbox"
        [checked]="task.is_completed"
        (change)="toggleTask(task)">

      <span class="checkmark"></span>
    </label>

    <div class="task-content">
      <span class="category-pill" *ngIf="editingTaskId !== task.id">{{ task.category || 'Perso' }}</span>

      <span
        class="task-text"
        [class.done]="task.is_completed"
        *ngIf="editingTaskId !== task.id">
        {{ task.description }}
      </span>

      <input
        *ngIf="editingTaskId === task.id"
        class="edit-input"
        type="text"
        [name]="'editTaskText' + task.id"
        [(ngModel)]="editTaskText"
        autocomplete="off" />

      <select
        *ngIf="editingTaskId === task.id"
        class="category-select"
        [name]="'editTaskCategory' + task.id"
        [(ngModel)]="editTaskCategory">
        <option *ngFor="let c of categories" [value]="c">{{ c }}</option>
      </select>
    </div>

    <div class="item-actions" *ngIf="editingTaskId !== task.id">
      <button class="action-btn" type="button" (click)="startEdit(task)">Modifier</button>
      <button
        class="action-btn danger"
        type="button"
        [disabled]="deletingTaskId === task.id"
        (click)="deleteTask(task)">
        {{ deletingTaskId === task.id ? 'Suppression...' : 'Supprimer' }}
      </button>
    </div>

    <div class="item-actions" *ngIf="editingTaskId === task.id">
      <button
        class="action-btn"
        type="button"
        [disabled]="isSavingEdit || !editTaskText.trim()"
        (click)="saveEdit(task)">
        {{ isSavingEdit ? 'Enregistrement...' : 'Enregistrer' }}
      </button>
      <button class="action-btn" type="button" [disabled]="isSavingEdit" (click)="cancelEdit()">Annuler</button>
    </div>
  </div>
</div>

<div class="card-actions">
  <form class="add-form" (ngSubmit)="addTask()">
    <select class="category-select" name="newTaskCategory" [(ngModel)]="newTaskCategory">
      <option *ngFor="let c of categories" [value]="c">{{ c }}</option>
    </select>
    <input
      class="task-input"
      type="text"
      name="newTaskText"
      [(ngModel)]="newTaskText"
      placeholder="Nouvelle tâche..."
      autocomplete="off">
    <button class="add-btn" type="submit" [disabled]="isAdding || !newTaskText.trim()">
      {{ isAdding ? 'Ajout...' : '+ Add Task' }}
    </button>
  </form>
</div>

<div class="app-alert app-alert--error" *ngIf="addErrorMessage">{{ addErrorMessage }}</div>
