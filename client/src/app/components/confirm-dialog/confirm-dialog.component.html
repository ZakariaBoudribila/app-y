<ng-container *ngIf="request$ | async as req">
  <div class="confirm-backdrop" (click)="cancel()"></div>

  <div class="confirm-shell" role="dialog" aria-modal="true" aria-label="Confirmation">
    <div class="confirm-card">
      <div class="confirm-title">{{ req.title || 'Confirmation' }}</div>
      <div class="confirm-message">{{ req.message }}</div>

      <div class="confirm-actions">
        <button type="button" class="btn btn-outline-primary" (click)="cancel()">Annuler</button>
        <button type="button" class="btn btn-primary" (click)="confirm()">Confirmer</button>
      </div>
    </div>
  </div>
</ng-container>
