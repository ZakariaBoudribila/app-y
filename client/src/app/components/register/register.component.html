<div class="login-container">
  <div class="login-card">
    <h1 class="title-cursive">S'inscrire</h1>
    <p class="subtitle">Crée ton journal personnel a lalla Yassmine</p>

    <div class="app-alert app-alert--error" *ngIf="errorMessage">
      {{ errorMessage }}
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
      <div class="form-group">
        <label for="username">Nom d'utilisateur</label>
        <input
          id="username"
          type="text"
          formControlName="username"
          placeholder="Ton nom"
          class="input-field"
          autocomplete="username">
        <div class="field-error" *ngIf="usernameCtrl.touched && usernameCtrl.invalid">
          <span *ngIf="usernameCtrl.errors?.['required']">Le nom est obligatoire.</span>
          <span *ngIf="usernameCtrl.errors?.['minlength']">Minimum 2 caractères.</span>
        </div>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          placeholder="ton@email.com"
          class="input-field"
          autocomplete="email">
        <div class="field-error" *ngIf="emailCtrl.touched && emailCtrl.invalid">
          <span *ngIf="emailCtrl.errors?.['required']">L'email est obligatoire.</span>
          <span *ngIf="emailCtrl.errors?.['email']">Email invalide.</span>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          placeholder="••••••••"
          class="input-field"
          autocomplete="new-password">
        <div class="field-error" *ngIf="passwordCtrl.touched && passwordCtrl.invalid">
          <span *ngIf="passwordCtrl.errors?.['required']">Le mot de passe est obligatoire.</span>
          <span *ngIf="passwordCtrl.errors?.['minlength']">Minimum 6 caractères.</span>
        </div>
      </div>

      <button class="submit-btn" type="submit" [disabled]="isSubmitting || form.invalid">
        {{ isSubmitting ? 'Création...' : 'Créer mon compte' }}
      </button>
    </form>

    <p class="switch-page">
      Déjà un compte ? <a routerLink="/login">Se connecter</a>
    </p>
  </div>
</div>
