<div class="pro-space">
  <h2>Espace Professionnel</h2>

  <div *ngIf="isLoading" class="state">Chargement…</div>
  <div *ngIf="errorMessage" class="error">{{ errorMessage }}</div>

  <form [formGroup]="form" (ngSubmit)="save()">
    <label class="field">
      <span>À propos</span>
      <textarea formControlName="aboutMe" rows="5" placeholder="Résumé, objectifs, points forts…"></textarea>
    </label>

    <div class="section">
      <div class="section-header">
        <h3>Langues</h3>
        <button type="button" (click)="addLanguage()">+ Ajouter</button>
      </div>

      <div formArrayName="languages" class="items">
        <div class="item" *ngFor="let group of languagesArray.controls; let i = index" [formGroupName]="i">
          <div class="row">
            <input formControlName="name" list="languagesList" placeholder="Langue (choisir ou taper)…" />
            <datalist id="languagesList">
              <option value="Afrikaans"></option>
              <option value="Albanais"></option>
              <option value="Allemand"></option>
              <option value="Amharique"></option>
              <option value="Anglais"></option>
              <option value="Arabe"></option>
              <option value="Arménien"></option>
              <option value="Azéri"></option>
              <option value="Basque"></option>
              <option value="Bengali"></option>
              <option value="Biélorusse"></option>
              <option value="Bosniaque"></option>
              <option value="Bulgare"></option>
              <option value="Birman"></option>
              <option value="Catalan"></option>
              <option value="Cebuano"></option>
              <option value="Chinois (mandarin)"></option>
              <option value="Chinois (cantonais)"></option>
              <option value="Coréen"></option>
              <option value="Croate"></option>
              <option value="Danois"></option>
              <option value="Néerlandais"></option>
              <option value="Anglais (US)"></option>
              <option value="Estonien"></option>
              <option value="Finnois"></option>
              <option value="Français"></option>
              <option value="Géorgien"></option>
              <option value="Grec"></option>
              <option value="Gujarati"></option>
              <option value="Haoussa"></option>
              <option value="Hébreu"></option>
              <option value="Hindi"></option>
              <option value="Hongrois"></option>
              <option value="Indonésien"></option>
              <option value="Irlandais"></option>
              <option value="Islandais"></option>
              <option value="Italien"></option>
              <option value="Japonais"></option>
              <option value="Kannada"></option>
              <option value="Kazakh"></option>
              <option value="Khmer"></option>
              <option value="Kirghize"></option>
              <option value="Lao"></option>
              <option value="Letton"></option>
              <option value="Lituanien"></option>
              <option value="Macédonien"></option>
              <option value="Malais"></option>
              <option value="Malayalam"></option>
              <option value="Marathi"></option>
              <option value="Mongol"></option>
              <option value="Norvégien"></option>
              <option value="Népalais"></option>
              <option value="Ourdou"></option>
              <option value="Ouzbek"></option>
              <option value="Pendjabi"></option>
              <option value="Persan"></option>
              <option value="Polonais"></option>
              <option value="Portugais"></option>
              <option value="Roumain"></option>
              <option value="Russe"></option>
              <option value="Serbe"></option>
              <option value="Slovaque"></option>
              <option value="Slovène"></option>
              <option value="Somali"></option>
              <option value="Espagnol"></option>
              <option value="Suédois"></option>
              <option value="Swahili"></option>
              <option value="Tamoul"></option>
              <option value="Télougou"></option>
              <option value="Thaï"></option>
              <option value="Tchèque"></option>
              <option value="Turc"></option>
              <option value="Ukrainien"></option>
              <option value="Vietnamien"></option>
              <option value="Wolof"></option>
              <option value="Yoruba"></option>
              <option value="Igbo"></option>
              <option value="Zoulou"></option>
            </datalist>
            <input formControlName="percent" type="number" min="0" max="100" placeholder="%" />
          </div>
          <div class="actions">
            <button type="button" (click)="removeLanguage(i)">Supprimer</button>
          </div>
        </div>
      </div>
    </div>

    <label class="field">
      <span>Logiciels (séparés par des virgules)</span>
      <input formControlName="softwareText" placeholder="Excel, Figma, Photoshop" />
    </label>

    <div class="section">
      <div class="section-header">
        <h3>Expériences</h3>
        <button type="button" (click)="addExperience()">+ Ajouter</button>
      </div>

      <div formArrayName="experiences" class="items">
        <div class="item" *ngFor="let group of experiencesArray.controls; let i = index" [formGroupName]="i">
          <div class="row">
            <input formControlName="title" placeholder="Poste" />
            <input formControlName="company" placeholder="Entreprise" />
          </div>
          <div class="row">
            <input formControlName="startDate" placeholder="Début (YYYY-MM)" />
            <input formControlName="endDate" placeholder="Fin (YYYY-MM)" />
          </div>
          <textarea formControlName="description" rows="3" placeholder="Missions, résultats…"></textarea>
          <div class="actions">
            <button type="button" (click)="removeExperience(i)">Supprimer</button>
          </div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-header">
        <h3>Études</h3>
        <button type="button" (click)="addEducation()">+ Ajouter</button>
      </div>

      <div formArrayName="education" class="items">
        <div class="item" *ngFor="let group of educationArray.controls; let i = index" [formGroupName]="i">
          <div class="row">
            <input formControlName="school" placeholder="Établissement" />
            <input formControlName="degree" placeholder="Diplôme" />
          </div>
          <div class="row">
            <input formControlName="startDate" placeholder="Début (YYYY-MM)" />
            <input formControlName="endDate" placeholder="Fin (YYYY-MM)" />
          </div>
          <textarea formControlName="description" rows="3" placeholder="Détails…"></textarea>
          <div class="actions">
            <button type="button" (click)="removeEducation(i)">Supprimer</button>
          </div>
        </div>
      </div>
    </div>

    <div class="footer">
      <button type="submit" [disabled]="isSaving">{{ isSaving ? 'Enregistrement…' : 'Enregistrer' }}</button>
    </div>
  </form>
</div>
