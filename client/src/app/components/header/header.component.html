<header class="main-header">
  <div class="header-left">
    <span class="date-display">{{ today | date:'EEEE, d MMMM' }}</span>
  </div>

  <div class="header-right" *ngIf="api.isLoggedIn()">
    <div class="user-info">
      <span class="welcome-text">Bienvenue, <strong>{{ userName }}🌸</strong></span>
    </div>
    <button class="logout-btn" (click)="logout()" title="Déconnexion">
      <span class="icon">🚪</span>
    </button>
  </div>
</header>
