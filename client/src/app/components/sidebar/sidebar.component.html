<div class="sidebar-content" [class.mobile-open]="mobileMenuOpen">
  <div class="mobile-topbar">
    <button
      type="button"
      class="mobile-menu-btn"
      (click)="toggleMobileMenu()"
      [attr.aria-expanded]="mobileMenuOpen"
      aria-controls="sidebar-menu">
      Menu
    </button>
  </div>

  <div class="logo-area">
    <h2>Menu</h2>
  </div>

  <nav id="sidebar-menu" class="sidebar-menu" [class.is-collapsed]="!mobileMenuOpen">
    <a
      [routerLink]="['/dashboard']"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
      class="menu-item"
      (click)="closeMobileMenu()">
      <span class="icon">🏠</span>
      <span class="label">Home</span>
    </a>

    <a
      [routerLink]="['/tasks']"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
      class="menu-item"
      (click)="closeMobileMenu()">
      <span class="icon">☑️</span>
      <span class="label">Tasks</span>
    </a>

    <a
      [routerLink]="['/mood']"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
      class="menu-item"
      (click)="closeMobileMenu()">
      <span class="icon">🌿</span>
      <span class="label">Mood</span>
    </a>

    <a
      [routerLink]="['/journal']"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
      class="menu-item"
      (click)="closeMobileMenu()">
      <span class="icon">📖</span>
      <span class="label">Journal</span>
    </a>

    <a
      [routerLink]="['/goals']"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
      class="menu-item"
      (click)="closeMobileMenu()">
      <span class="icon">🎯</span>
      <span class="label">Goals</span>
    </a>

    <a
      [routerLink]="['/history']"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
      class="menu-item"
      (click)="closeMobileMenu()">
      <span class="icon">🗓️</span>
      <span class="label">Historique</span>
    </a>

    <a
      [routerLink]="['/pro']"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
      class="menu-item"
      (click)="closeMobileMenu()">
      <span class="icon">💼</span>
      <span class="label">Espace Pro</span>
    </a>

    <a
      [routerLink]="['/settings']"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
      class="menu-item"
      (click)="closeMobileMenu()">
      <span class="icon">⚙️</span>
      <span class="label">Paramètres</span>
    </a>
    
    <a (click)="logout()" class="menu-item logout-style" style="cursor: pointer;">
      <span class="icon">🚪</span>
      <span class="label">Quitter</span>
    </a>
  </nav>
</div>
