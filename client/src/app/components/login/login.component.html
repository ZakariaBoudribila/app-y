<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-12 col-sm-10 col-md-6 col-lg-4">
      <div class="card shadow-sm">
        <div class="card-body p-4">
          <div class="text-center mb-3">
            <h1 class="display-title mb-1">Bienvenue</h1>
            <h2 class="display-title mb-1">Lalla Yassmine</h2>
            <div class="text-body-secondary">Connecte-toi à ton journal</div>
          </div>

          <div class="alert alert-danger" *ngIf="errorMessage">
            {{ errorMessage }}
          </div>

          <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
            <div class="mb-3">
              <label for="email" class="form-label">Email</label>
              <input
                id="email"
                type="email"
                formControlName="email"
                placeholder="ton@email.com"
                class="form-control"
                autocomplete="email">
              <div class="invalid-feedback d-block" *ngIf="emailCtrl.touched && emailCtrl.invalid">
                <span *ngIf="emailCtrl.errors?.['required']">L'email est obligatoire.</span>
                <span *ngIf="emailCtrl.errors?.['email']">Email invalide.</span>
              </div>
            </div>

            <div class="mb-3">
              <label for="password" class="form-label">Mot de passe</label>
              <input
                id="password"
                type="password"
                formControlName="password"
                placeholder="••••••••"
                class="form-control"
                autocomplete="current-password">
              <div class="invalid-feedback d-block" *ngIf="passwordCtrl.touched && passwordCtrl.invalid">
                <span *ngIf="passwordCtrl.errors?.['required']">Le mot de passe est obligatoire.</span>
                <span *ngIf="passwordCtrl.errors?.['minlength']">Minimum 6 caractères.</span>
              </div>
            </div>

            <button class="btn btn-primary w-100" type="submit" [disabled]="isSubmitting || form.invalid">
              {{ isSubmitting ? 'Connexion...' : 'Se connecter' }}
            </button>
          </form>

          <div class="text-center mt-3">
            <span class="text-body-secondary">Pas encore de compte ?</span>
            <a class="ms-1" routerLink="/register">S'inscrire</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
