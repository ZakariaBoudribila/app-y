<div class="login-container">
  <div class="login-card">
    <h1 class="title-cursive">Bienvenue,     Lalla Yassmine</h1>
    <p class="subtitle">Connecte-toi à ton journal</p>

    <div class="app-alert app-alert--error" *ngIf="errorMessage">
      {{ errorMessage }}
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
      <div class="form-group">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          placeholder="ton@email.com"
          class="input-field"
          autocomplete="email">
        <div class="field-error" *ngIf="emailCtrl.touched && emailCtrl.invalid">
          <span *ngIf="emailCtrl.errors?.['required']">L'email est obligatoire.</span>
          <span *ngIf="emailCtrl.errors?.['email']">Email invalide.</span>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          placeholder="••••••••"
          class="input-field"
          autocomplete="current-password">
        <div class="field-error" *ngIf="passwordCtrl.touched && passwordCtrl.invalid">
          <span *ngIf="passwordCtrl.errors?.['required']">Le mot de passe est obligatoire.</span>
          <span *ngIf="passwordCtrl.errors?.['minlength']">Minimum 6 caractères.</span>
        </div>
      </div>

      <button class="submit-btn" type="submit" [disabled]="isSubmitting || form.invalid">
        {{ isSubmitting ? 'Connexion...' : 'Se connecter' }}
      </button>
    </form>

    <p class="switch-page">
      Pas encore de compte ? <a routerLink="/register">S'inscrire</a>
    </p>
  </div>
</div>
